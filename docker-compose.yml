services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - backend-data:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"

volumes:
  backend-data:
