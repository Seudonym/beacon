services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      SESSION_SECRET: ${SESSION_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    volumes:
      - backend-data:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend-data:
